services:
  - type: web
    name: intelligent-sentiment-monitor
    runtime: python
    plan: free        # Render free tier
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SERPER_API_KEY
        sync: false   # 在 Render Dashboard 设置
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: BING_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true  # 自动生成
